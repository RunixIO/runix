name: CI

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/ci.yml"

env:
  GO_VERSION: "1.25"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-go@0aaccfd150d50ccaeb581d32dbe20912f2b2c3e4 # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Verify dependencies
        run: go mod verify

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -trimpath ./...

      - name: Format check
        run: test -z "$(gofmt -l -s .)"

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@55c2c1448e8c665673dade7245a64e6f2566b5a2 # v7
        with:
          version: latest

      - name: Test
        run: go test -v -count=1 -race -timeout 120s ./...

      - name: Test (E2E)
        run: go test -v -count=1 -timeout 120s ./internal/e2e/...

  build-matrix:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-go@0aaccfd150d50ccaeb581d32dbe20912f2b2c3e4 # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          CGO_ENABLED=0 go build \
            -buildvcs=false \
            -trimpath \
            -ldflags "-s -w -X github.com/runixio/runix/internal/version.Version=ci" \
            -o runix \
            ./cmd/runix

  nix:
    name: Nix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: DeterminateSystems/nix-installer-action@21a544748d4c3095b17f6a9a3dc513c727ea4b54 # v17

      - uses: DeterminateSystems/magic-nix-cache-action@87e42346a5b4f696e195e7b135c6731e0b7d3d8b # v12

      - name: Check flake
        run: nix flake check --all-systems

      - name: Build
        run: nix build .

      - name: Verify binary
        run: ./result/bin/runix version
