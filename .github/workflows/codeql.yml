name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
  pull_request:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
  schedule:
    - cron: "3 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: github/codeql-action/init@f7a4a7df985d2cfc89dfd3e5fd6bc295c17eab8e # v3
        with:
          languages: go

      - uses: github/codeql-action/analyze@f7a4a7df985d2cfc89dfd3e5fd6bc295c17eab8e # v3
        with:
          category: "/language:go"
