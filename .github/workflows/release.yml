name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: runix
  GO_VERSION: "1.25"

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-go@0aaccfd150d50ccaeb581d32dbe20912f2b2c3e4 # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist

          ext=""
          [ "${GOOS}" = "windows" ] && ext=".exe"

          CGO_ENABLED=0 go build \
            -buildvcs=false \
            -trimpath \
            -ldflags "-s -w -X github.com/runixio/runix/internal/version.Version=${VERSION} -X github.com/runixio/runix/internal/version.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/${APP_NAME}_${GOOS}_${GOARCH}${ext}" \
            ./cmd/runix

          # Package into archive.
          pkg_dir="dist/${APP_NAME}_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "${pkg_dir}"
          cp "dist/${APP_NAME}_${GOOS}_${GOARCH}${ext}" "${pkg_dir}/${APP_NAME}${ext}"
          cp README.md "${pkg_dir}/"
          cp LICENSE "${pkg_dir}/"

          if [ "${GOOS}" = "windows" ]; then
            (cd dist && zip -rq "${APP_NAME}_${VERSION}_${GOOS}_${GOARCH}.zip" "$(basename "${pkg_dir}")")
          else
            tar -C dist -czf "dist/${APP_NAME}_${VERSION}_${GOOS}_${GOARCH}.tar.gz" "$(basename "${pkg_dir}")"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/${{ env.APP_NAME }}_${{ matrix.goos }}_${{ matrix.goarch }}*
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.zip \
            ${APP_NAME}_linux_amd64 \
            ${APP_NAME}_linux_arm64 \
            ${APP_NAME}_darwin_amd64 \
            ${APP_NAME}_darwin_arm64 \
            ${APP_NAME}_windows_amd64.exe \
            > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac0b586674事e2d1 # v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/${{ env.APP_NAME }}_linux_amd64
            dist/${{ env.APP_NAME }}_linux_arm64
            dist/${{ env.APP_NAME }}_darwin_amd64
            dist/${{ env.APP_NAME }}_darwin_arm64
            dist/${{ env.APP_NAME }}_windows_amd64.exe
