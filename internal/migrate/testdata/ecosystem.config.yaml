apps:
  - name: api
    script: app.js
    interpreter: bun
    instances: 4
    watch:
      - src
      - lib
    ignore_watch:
      - node_modules
    cron_restart: "0 3 * * *"
    autorestart: true
    max_memory_restart: "1G"

  - name: background-worker
    script: worker.py
    interpreter: python3
    args:
      - "--queue"
      - "high"
      - "--verbose"
    env:
      QUEUE_URL: "redis://localhost:6379"
    restart_delay: 2000

  - name: static-app
    script: serve.js
    autorestart: false
